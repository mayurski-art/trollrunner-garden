<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="120" height="120">
  <!-- original pixel "troll farmer" mascot: grinning gardener in a straw hat -->
  <!-- straw hat brim -->
  <rect x="3"  y="9"  width="26" height="2" fill="#e7b53d"/>
  <rect x="4"  y="8"  width="24" height="1" fill="#f3cb5e"/>
  <rect x="3"  y="11" width="26" height="1" fill="#b98321"/>
  <!-- hat top -->
  <rect x="9"  y="4"  width="14" height="5" fill="#f3cb5e"/>
  <rect x="9"  y="3"  width="14" height="1" fill="#e7b53d"/>
  <rect x="10" y="6"  width="12" height="1" fill="#d9a52f"/>
  <!-- hat band -->
  <rect x="9"  y="8"  width="14" height="1" fill="#2e7d32"/>
  <!-- face -->
  <rect x="8"  y="12" width="16" height="13" fill="#cfe8a8"/>
  <rect x="7"  y="14" width="1"  height="8"  fill="#cfe8a8"/>
  <rect x="24" y="14" width="1"  height="8"  fill="#cfe8a8"/>
  <!-- face shading -->
  <rect x="8"  y="24" width="16" height="1"  fill="#a9cf7e"/>
  <!-- eyebrows (troll smug) -->
  <rect x="10" y="14" width="4"  height="1"  fill="#2b1d0e"/>
  <rect x="18" y="14" width="4"  height="1"  fill="#2b1d0e"/>
  <!-- eyes -->
  <rect x="11" y="15" width="2"  height="2"  fill="#2b1d0e"/>
  <rect x="19" y="15" width="2"  height="2"  fill="#2b1d0e"/>
  <!-- big troll grin -->
  <rect x="9"  y="19" width="14" height="1"  fill="#2b1d0e"/>
  <rect x="9"  y="20" width="1"  height="2"  fill="#2b1d0e"/>
  <rect x="22" y="20" width="1"  height="2"  fill="#2b1d0e"/>
  <rect x="10" y="21" width="12" height="2"  fill="#2b1d0e"/>
  <rect x="11" y="20" width="10" height="1"  fill="#ffffff"/>
  <!-- a little sprout sticking out of the hat -->
  <rect x="15" y="1"  width="2"  height="3"  fill="#3aa84a"/>
  <rect x="13" y="2"  width="2"  height="1"  fill="#5fbf3a"/>
  <rect x="17" y="2"  width="2"  height="1"  fill="#5fbf3a"/>
</svg>
